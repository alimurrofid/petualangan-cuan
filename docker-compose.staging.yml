services:
  frontend:
    image: ghcr.io/alimurrofid/petualangan-cuan/frontend:staging
    container_name: staging_frontend
    environment:
      - VITE_API_URL=${FRONTEND_URL}/api
    ports:
      - "${FRONTEND_PORT:-3300}:80"
    networks:
      - staging-network
    restart: always

  backend:
    image: ghcr.io/alimurrofid/petualangan-cuan/backend:staging
    container_name: staging_backend
    environment:
      - PORT=${PORT}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL}
      - LOCAL_WHISPER_URL=${LOCAL_WHISPER_URL}
      - AI_PROVIDER=${AI_PROVIDER}
      - EXTERNAL_AI_URL=${EXTERNAL_AI_URL}
      - EXTERNAL_AI_API_KEY=${EXTERNAL_AI_API_KEY}
      - EXTERNAL_AI_MODEL=${EXTERNAL_AI_MODEL}
      - WA_GATEWAY_URL=${WA_GATEWAY_URL}
      - WA_GATEWAY_USERNAME=${WA_GATEWAY_USERNAME}
      - WA_GATEWAY_PASSWORD=${WA_GATEWAY_PASSWORD}
      - WHATSAPP_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET}
      - TZ=Asia/Jakarta
    ports:
      - "${BACKEND_PORT:-8888}:${PORT}"
    volumes:
      - ./uploads_staging:/app/uploads
    depends_on:
      postgres:
        condition: service_started
      llm-server:
        condition: service_started
      whisper-server:
        condition: service_started
    networks:
      - staging-network
    restart: always
    user: appuser
  
  postgres:
    image: postgres:15-alpine
    container_name: staging_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5555}:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    networks:
      - staging-network
    restart: always

  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: staging_llm
    volumes:
      - ../shared/ai-models:/models
    command: >
      -m /models/google_gemma-3-4b-it-Q4_K_M.gguf
      --mmproj /models/mmproj-google_gemma-3-4b-it-f16.gguf
      --host 0.0.0.0
      --port 8080
      -c 4096
      -t 2
    deploy:
      resources:
        limits:
          memory: 4G
    ports:
      - "${LLM_PORT:-8881}:8080"
    networks:
      - staging-network
    restart: always

  whisper-server:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: staging_whisper
    ports:
      - "${WHISPER_PORT:-8800}:8000"
    volumes:
      - ../shared/ai-models/whisper:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=small
    networks:
      - staging-network
    restart: always

  wa-gateway:
    image: ghcr.io/alimurrofid/petualangan-cuan/wa-gateway:staging
    container_name: staging_wa_gateway
    ports:
      - "${WA_GATEWAY_PORT:-3330}:3000"
    environment:
      - APP_BASIC_AUTH=${WA_GATEWAY_USERNAME:-admin}:${WA_GATEWAY_PASSWORD:-admin}
      - WHATSAPP_WEBHOOK=${WA_WEBHOOK_URL}
      - WHATSAPP_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET}
      - WHATSAPP_WEBHOOK_EVENTS=message
      - WHATSAPP_AUTO_MARK_READ=true
    volumes:
      - ./wa-gateway-data_staging:/app/data
    networks:
      - staging-network
    restart: always

  loki:
    image: grafana/loki:latest
    container_name: staging_loki
    ports:
      - "${LOKI_PORT:-3110}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data_staging:/loki
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  promtail:
    image: grafana/promtail:latest
    container_name: staging_promtail
    user: root
    privileged: true
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana-oss:10.4.1
    container_name: staging_grafana
    ports:
      - "${GRAFANA_PORT:-3302}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/petualangan-cuan.json
    volumes:
      - grafana_data_staging:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: staging_uptime
    ports:
      - "${UPTIME_KUMA_PORT:-3301}:3001"
    volumes:
      - uptime_kuma_data_staging:/app/data
    networks:
      - staging-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  staging-network:
    driver: bridge

volumes:
  postgres_data_staging:
  loki_data_staging:
  grafana_data_staging:
  uptime_kuma_data_staging:
