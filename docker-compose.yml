services:
  backend:
    build: 
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: petualangan_cuan_backend
    environment:
      - PORT=${PORT}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL}
      - LOCAL_WHISPER_URL=${LOCAL_WHISPER_URL}
      - AI_PROVIDER=${AI_PROVIDER}
      - EXTERNAL_AI_URL=${EXTERNAL_AI_URL}
      - EXTERNAL_AI_API_KEY=${EXTERNAL_AI_API_KEY}
      - EXTERNAL_AI_MODEL=${EXTERNAL_AI_MODEL}
      - TZ=Asia/Jakarta
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_started
      llm-server:
        condition: service_started
      whisper-server:
        condition: service_started
    networks:
      - app-network
    restart: always
    user: appuser
  
  postgres:
    image: postgres:15-alpine
    container_name: petualangan_cuan_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always

  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: petualangan_cuan_llm
    volumes:
      - ./ai-models:/models
    command: >
      -m /models/google_gemma-3-4b-it-Q4_K_M.gguf
      --mmproj /models/mmproj-google_gemma-3-4b-it-f16.gguf
      --host 0.0.0.0
      --port 8080
      -c 4096
      -t 8
    deploy:
      resources:
        limits:
          memory: 8G
    ports:
      - "8081:8080"
    networks:
      - app-network
    restart: always

  whisper-server:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: petualangan_cuan_whisper
    ports:
      - "8000:8000"
    volumes:
      - ./ai-models/whisper:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=small
    networks:
      - app-network
    restart: always

  loki:
    image: grafana/loki:latest
    container_name: petualangan_cuan_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  promtail:
    image: grafana/promtail:latest
    container_name: petualangan_cuan_promtail
    user: root
    privileged: true
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana-oss:10.4.1
    container_name: petualangan_cuan_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admincuan
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/petualangan-cuan.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: petualangan_cuan_uptime
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  loki_data:
  grafana_data:
  uptime_kuma_data:

