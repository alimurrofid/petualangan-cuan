services:
  backend:
    build: 
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: petualangan_cuan_backend
    environment:
      - PORT=${PORT}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - LLM_URL=${LLM_URL}
      - TZ=Asia/Jakarta
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_started
      llm-server:
        condition: service_started
    networks:
      - app-network
    restart: always
    user: appuser
  
  postgres:
    image: postgres:15-alpine
    container_name: petualangan_cuan_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always

  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: petualangan_cuan_llm
    volumes:
      - ./ai-models:/models
    command: >
      -m /models/google_gemma-3-4b-it-Q4_K_M.gguf
      --mmproj /models/mmproj-google_gemma-3-4b-it-f16.gguf
      --host 0.0.0.0
      --port 8080
      -c 4096
      -t 8
    deploy:
      resources:
        limits:
          memory: 8G
    ports:
      - "8081:8080"
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
